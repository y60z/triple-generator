<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Triple Generator</title>

<style>

body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif;
}

header{
    text-align:center;
    padding:35px 20px 15px;
}

h1{
    margin:0;
    color:#d4af37;
    font-size:42px;
}

.stage{
    margin-top:10px;
    color:#777;
    font-size:17px;
}

.controls{
    padding:15px;
}

.generateBtn{
    width:100%;
    padding:18px;
    border:none;
    border-radius:16px;
    background:#d4af37;
    color:#000;
    font-size:20px;
    font-weight:bold;
}

.counter{
    text-align:center;
    color:#888;
    margin-top:12px;
}

#names{
    padding:15px;
}

.card{
    background:#111;
    border:1px solid #222;
    border-radius:16px;
    padding:18px;
    margin-bottom:14px;
    transition:0.2s;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.username{
    font-size:24px;
    letter-spacing:2px;
    font-weight:bold;
}

.used{
    opacity:0.35;
}

.actions{
    display:flex;
    gap:10px;
    margin-top:14px;
}

.actions button{
    flex:1;
    border:none;
    border-radius:12px;
    padding:12px;
    font-weight:bold;
    font-size:16px;
}

.openBtn{
    background:#fffc00;
    color:#000;
}

.copyBtn{
    background:#222;
    color:#fff;
}

</style>
</head>

<body>

<header>
    <h1>Triple Generator</h1>

    <div class="stage" id="stageText">
        المرحلة: أسماء احترافية
    </div>
</header>

<div class="controls">

    <button class="generateBtn" onclick="generateNames()">
        توليد 100 اسم
    </button>

    <div class="counter" id="counter">
        جاهز للتوليد
    </div>

</div>

<div id="names"></div>

<script>

const cleanChars = "abcdefghijklmnopqrstuvwxyz";
const mixedChars = "abcdefghijklmnopqrstuvwxyz0123456789_.";

let usedNames =
JSON.parse(localStorage.getItem("usedNames") || "[]");

let checkedNames =
JSON.parse(localStorage.getItem("checkedNames") || "[]");

let stage =
Number(localStorage.getItem("stage") || "1");

const namesContainer =
document.getElementById("names");

function saveData(){

    localStorage.setItem(
        "usedNames",
        JSON.stringify(usedNames)
    );

    localStorage.setItem(
        "checkedNames",
        JSON.stringify(checkedNames)
    );

    localStorage.setItem(
        "stage",
        stage
    );
}

function randomChar(chars){

    return chars[
        Math.floor(Math.random() * chars.length)
    ];
}

function generateClean(){

    const patterns = [

        () =>
        randomChar(cleanChars) +
        randomChar(cleanChars) +
        randomChar(cleanChars),

        () =>
        randomChar(cleanChars) +
        randomChar("0123456789") +
        randomChar(cleanChars),

        () =>
        randomChar(cleanChars) +
        randomChar(cleanChars) +
        randomChar("0123456789"),

        () =>
        randomChar("0123456789") +
        randomChar(cleanChars) +
        randomChar(cleanChars)

    ];

    return patterns[
        Math.floor(Math.random() * patterns.length)
    ]();
}

function generateMixed(){

    while(true){

        let name =
        randomChar(mixedChars) +
        randomChar(mixedChars) +
        randomChar(mixedChars);

        if(
            !name.startsWith(".") &&
            !name.startsWith("_") &&
            !name.endsWith(".") &&
            !name.endsWith("_") &&
            !name.includes("..") &&
            !name.includes("__")
        ){
            return name;
        }
    }
}

function generateUnique(){

    let attempts = 0;

    while(attempts < 999999){

        let name;

        if(stage === 1){
            name = generateClean();
        }else{
            name = generateMixed();
        }

        if(!usedNames.includes(name)){

            usedNames.push(name);

            return name;
        }

        attempts++;
    }

    stage = 2;

    saveData();

    document.getElementById("stageText")
    .innerText =
    "المرحلة: أسماء مركبة";

    return generateUnique();
}

function generateNames(){

    namesContainer.innerHTML = "";

    let generated = [];

    for(let i=0; i<100; i++){

        generated.push(
            generateUnique()
        );
    }

    saveData();

    document.getElementById("counter")
    .innerText =
    "تم توليد 100 اسم";

    render(generated);
}

function render(list){

    list.forEach(name => {

        const card =
        document.createElement("div");

        card.className = "card";

        if(
            checkedNames.includes(name)
        ){
            card.classList.add("used");
        }

        card.innerHTML = `

            <div class="top">

                <div class="username">
                    ${name}
                </div>

            </div>

            <div class="actions">

                <button class="openBtn">
                    فتح سناب
                </button>

                <button class="copyBtn">
                    نسخ
                </button>

            </div>

        `;

        const openBtn =
        card.querySelector(".openBtn");

        const copyBtn =
        card.querySelector(".copyBtn");

        openBtn.onclick = () => {

            window.open(
                "https://www.snapchat.com/add/" + name,
                "_blank"
            );

            if(
                !checkedNames.includes(name)
            ){
                checkedNames.push(name);
            }

            card.classList.add("used");

            saveData();
        };

        copyBtn.onclick = async () => {

            await navigator.clipboard.writeText(name);

            if(
                !checkedNames.includes(name)
            ){
                checkedNames.push(name);
            }

            card.classList.add("used");

            copyBtn.innerText = "تم النسخ";

            saveData();
        };

        namesContainer.appendChild(card);

    });
}

if(stage === 2){

    document.getElementById("stageText")
    .innerText =
    "المرحلة: أسماء مركبة";
}

</script>

</body>
</html>
