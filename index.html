<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مولد اليوزرات الثلاثية</title>

<style>

body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif;
}

header{
    text-align:center;
    padding:30px 20px;
}

h1{
    margin:0;
    color:#ffd43b;
    font-size:38px;
}

.info{
    color:#888;
    margin-top:10px;
    font-size:16px;
}

.topBtn{
    padding:20px;
}

.generateBtn{
    width:100%;
    padding:18px;
    border:none;
    border-radius:16px;
    background:#ffd43b;
    color:#000;
    font-size:20px;
    font-weight:bold;
}

#list{
    padding:15px;
}

.card{
    background:#111;
    border:1px solid #222;
    border-radius:16px;
    padding:16px;
    margin-bottom:14px;
    transition:0.2s;
}

.used{
    opacity:0.35;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.username{
    font-size:24px;
    font-weight:bold;
    letter-spacing:2px;
}

.actions{
    display:flex;
    gap:8px;
    margin-top:14px;
}

.actions button{
    flex:1;
    border:none;
    border-radius:12px;
    padding:12px;
    font-weight:bold;
    font-size:15px;
}

.snap{
    background:#fffc00;
    color:#000;
}

.tiktok{
    background:#000;
    color:#fff;
    border:1px solid #444 !important;
}

.copy{
    background:#2b2b2b;
    color:#fff;
}

.counter{
    text-align:center;
    color:#777;
    margin-top:12px;
}

</style>
</head>

<body>

<header>

    <h1>
        مولد اليوزرات الثلاثية
    </h1>

    <div class="info">
        يبدأ بالأسماء المرتبة ثم المركبة
    </div>

</header>

<div class="topBtn">

    <button class="generateBtn"
    onclick="generateBatch()">

        توليد 100 اسم

    </button>

    <div class="counter"
    id="counter">

        جاهز

    </div>

</div>

<div id="list"></div>

<script>

const chars =
"abcdefghijklmnopqrstuvwxyz";

let currentIndex =
parseInt(
localStorage.getItem("currentIndex")
|| "0"
);

let checked =
JSON.parse(
localStorage.getItem("checked")
|| "[]"
);

function numberToName(num){

    const a =
    chars[Math.floor(num / 676) % 26];

    const b =
    chars[Math.floor(num / 26) % 26];

    const c =
    chars[num % 26];

    return a + b + c;
}

function save(){

    localStorage.setItem(
        "currentIndex",
        currentIndex
    );

    localStorage.setItem(
        "checked",
        JSON.stringify(checked)
    );
}

function generateBatch(){

    const list =
    document.getElementById("list");

    list.innerHTML = "";

    for(let i=0; i<100; i++){

        const username =
        numberToName(currentIndex);

        currentIndex++;

        createCard(username);
    }

    document.getElementById(
        "counter"
    ).innerText =
    "تم توليد 100 اسم";

    save();
}

function createCard(username){

    const list =
    document.getElementById("list");

    const card =
    document.createElement("div");

    card.className = "card";

    if(
        checked.includes(username)
    ){
        card.classList.add("used");
    }

    card.innerHTML = `

        <div class="top">

            <div class="username">
                ${username}
            </div>

        </div>

        <div class="actions">

            <button class="snap">
                سناب
            </button>

            <button class="tiktok">
                تيك توك
            </button>

            <button class="copy">
                نسخ
            </button>

        </div>

    `;

    const snapBtn =
    card.querySelector(".snap");

    const tiktokBtn =
    card.querySelector(".tiktok");

    const copyBtn =
    card.querySelector(".copy");

    snapBtn.onclick = () => {

        window.open(
        "https://www.snapchat.com/add/" +
        username,
        "_blank"
        );

        markUsed(username, card);
    };

    tiktokBtn.onclick = () => {

        window.open(
        "https://www.tiktok.com/@" +
        username,
        "_blank"
        );

        markUsed(username, card);
    };

    copyBtn.onclick = async () => {

        await navigator.clipboard
        .writeText(username);

        copyBtn.innerText =
        "تم النسخ";

        markUsed(username, card);
    };

    list.appendChild(card);
}

function markUsed(username, card){

    if(
        !checked.includes(username)
    ){
        checked.push(username);
    }

    card.classList.add("used");

    save();
}

</script>

</body>
</html>
